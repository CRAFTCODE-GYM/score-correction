<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>入力確認・訂正反映</title>
<style>
  :root{
    --ink:#1a1a1a; --btn:#4d79e6; --btn-hover:#3a63cc; --ok:#2e7d32; --warn:#c0392b;
    --sheet:#188038; --sheet-hover:#0f6b2c;
    --d-bg:#fbeceb; --d-line:#e6b8b3;
    --pen-bg:#e5f7f7; --pen-line:#b6e2e2;
    --calc-bg:#eceef7; --calc-line:#c9cfe8;
    --corr:#e6a817;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:"Helvetica Neue",Arial,"Hiragino Kaku Gothic ProN","Hiragino Sans",Meiryo,sans-serif;
    color:var(--ink); background:#f2f3f5;}
  .wrap{max-width:1180px; margin:0 auto; padding:16px;}

  .topbar{background:#2b2f3a; color:#fff; padding:12px 20px; position:sticky; top:0; z-index:20;
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;}
  .topbar h1{font-size:17px; font-weight:bold; margin-right:auto;}
  .sheet-btn{background:var(--sheet); color:#fff; text-decoration:none; font-weight:bold;
    padding:9px 16px; border-radius:6px; font-size:14px;}
  .sheet-btn:hover{background:var(--sheet-hover);}
  .rbtn{background:var(--btn); color:#fff; border:none; padding:9px 16px; border-radius:6px;
    font-size:14px; cursor:pointer; font-weight:bold;}
  .rbtn:hover{background:var(--btn-hover);}

  .bar{display:flex; align-items:center; gap:16px; flex-wrap:wrap; margin-bottom:12px; font-size:14px; color:#555;}
  .bar label{display:inline-flex; align-items:center; gap:5px; cursor:pointer;}
  .bar select{font-size:14px; padding:2px 4px;}
  .counts{display:flex; gap:8px;}
  .chip{padding:3px 12px; border-radius:14px; font-size:13px; font-weight:bold;}
  .chip.new{background:#fff8e1; border:1px solid #f0c040; color:#9a6b00;}
  .chip.done{background:#f2f5f2; border:1px solid #ccc; color:#666;}
  .chip.fold{background:#e8eefc; border:1px solid #b9caf0; color:#3f51b5;}
  #updated{margin-left:auto; color:#888; font-size:12px;}

  #msg{min-height:20px; margin-bottom:10px; font-size:14px;}
  #msg.err{color:var(--warn); font-weight:bold;} #msg.ok{color:var(--ok);}
  .copyhint{font-size:12px; color:#999; margin-bottom:10px;}

  #foldedArea{margin-bottom:14px;}
  .fold-toggle{width:100%; text-align:left; background:#e7ebf3; border:1px solid #d5dced;
    color:#4a5a92; padding:10px 14px; border-radius:8px; cursor:pointer; font-size:14px; font-weight:bold;}
  .fold-toggle:hover{background:#dde3ef;}
  .fold-toggle .arrow{display:inline-block; transition:transform .15s; margin-right:6px;}
  .fold-toggle.open .arrow{transform:rotate(90deg);}
  #foldedList{margin-top:10px; display:none;}
  #foldedList.open{display:block;}

  .grp-head{background:#3f51b5; color:#fff; font-weight:bold; font-size:15px;
    padding:8px 14px; border-radius:6px; margin:16px 0 8px; display:flex; align-items:center; gap:10px;}
  .grp-head .grp-total{font-weight:normal; font-size:13px; opacity:.85;}
  .grp-head .grp-badge{margin-left:auto; font-size:13px; font-weight:bold; padding:2px 12px; border-radius:12px;
    background:#ffd54a; color:#7a5600;}
  .grp-head .grp-badge.done{background:rgba(255,255,255,.25); color:#fff;}

  .card{background:#fff; border:1px solid #e2e5ea; border-radius:10px; margin-bottom:12px;
    box-shadow:0 1px 3px rgba(0,0,0,.06); overflow:hidden;}
  .card.new{border-left:6px solid #f0c040;}
  .card.done{border-left:6px solid #bcc3cf; opacity:.72;}
  .card.corr{border-left:6px solid var(--corr);}

  /* 種目バナー（男女・種目を大きく表示して一次認知を高める） */
  .ev-banner{display:flex; align-items:baseline; gap:14px; padding:10px 18px;
    color:#fff; background:#556; }
  .ev-banner.m{background:linear-gradient(90deg,#1e63c4,#2f7de0);}   /* 男子：青 */
  .ev-banner.w{background:linear-gradient(90deg,#c43570,#e0508f);}   /* 女子：赤系 */
  .ev-banner .ev-gender{font-size:20px; font-weight:bold; padding:1px 12px;
    background:rgba(255,255,255,.22); border-radius:6px; letter-spacing:1px;}
  .ev-banner .ev-name{font-size:26px; font-weight:800; letter-spacing:1px;}
  .card.done .ev-banner{filter:grayscale(.55);}

  .card-head{display:flex; align-items:center; gap:12px; padding:12px 16px; background:#f6f7f9; flex-wrap:wrap;}
  .bib{font-size:26px; font-weight:bold; min-width:56px; text-align:center; color:#333;}
  .who{flex:1; min-width:180px;}
  .who .nm{font-size:19px; font-weight:bold;}
  .who .sub{font-size:13px; color:#666; margin-top:2px;}
  .tags{display:flex; gap:6px; align-items:center; flex-wrap:wrap;}
  .tag{font-size:12px; font-weight:bold; padding:2px 10px; border-radius:12px;}
  .tag.in{background:#d7f0c8; color:#3a6b1e;}
  .tag.co{background:#ffe9b0; color:#8a5a00;}
  .tstamp{font-size:12px; color:#999;}

  .card-body{display:grid; grid-template-columns:1fr 1fr; gap:0;}
  @media (max-width:720px){ .card-body{grid-template-columns:1fr;} .col.right{border-left:none; border-top:1px solid #eee;} }
  .col{padding:10px 16px;}
  .col.right{border-left:1px solid #eee;}

  .fld{display:flex; align-items:stretch; margin-bottom:8px; border:1px solid #dcdfe4;
    border-radius:6px; overflow:hidden; cursor:pointer; background:#fff;}
  .fld:hover{border-color:var(--btn);}
  .fld .k{width:130px; flex:none; display:flex; align-items:center; padding:0 12px;
    font-size:13px; font-weight:bold; color:#444; background:#f4f5f7; border-right:1px solid #e4e6ea;}
  .fld .v{flex:1; display:flex; align-items:center; justify-content:flex-end;
    padding:0 14px; height:42px; font-size:18px; font-variant-numeric:tabular-nums;}
  .fld .v.empty{color:#c2c2c2;}
  .fld.d .k{background:var(--d-bg); border-color:var(--d-line);}
  .fld.d{border-color:var(--d-line);}
  .fld.pen .k{background:var(--pen-bg); border-color:var(--pen-line);}
  .fld.pen{border-color:var(--pen-line);}
  .fld.calc .k{background:var(--calc-bg); border-color:var(--calc-line);}
  .fld.calc{border-color:var(--calc-line);}
  .fld.copied{outline:2px solid var(--ok); outline-offset:-2px;}
  .fld.copied .v{background:#eafaf0;}
  .fld .v{position:relative;}
  .fld:active{background:#eef3ff;}

  /* コピー通知トースト */
  #toast{position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(20px);
    background:#2e7d32; color:#fff; padding:12px 22px; border-radius:8px; font-size:15px; font-weight:bold;
    box-shadow:0 4px 16px rgba(0,0,0,.25); opacity:0; pointer-events:none; transition:opacity .15s, transform .15s;
    z-index:100; max-width:90vw;}
  #toast.ng{background:var(--warn);}
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .fld.copied .v::after{content:" ✓"; color:var(--ok); font-size:14px; font-weight:bold; margin-left:6px;}

  .card-foot{display:flex; align-items:center; gap:16px; padding:10px 16px; border-top:1px solid #eee;
    background:#fafbfc; flex-wrap:wrap;}
  .final{font-size:15px;}
  .final b{font-size:22px; color:#b23a2a; margin-left:6px; font-variant-numeric:tabular-nums;}
  .reflect-lbl, .approve-lbl{display:inline-flex; align-items:center; gap:8px;
    font-size:15px; font-weight:bold; cursor:pointer; padding:6px 14px; border-radius:8px;
    border:1px solid #cfd6e4; background:#fff;}
  .approve-lbl{margin-left:auto;}
  .reflect-lbl input, .approve-lbl input{width:22px; height:22px; cursor:pointer;}
  .card.done .reflect-lbl{background:#eef4ee; border-color:#bcd3bc; color:#3a6b3a;}
  .approve-lbl.on{background:#eef1fb; border-color:#9fb0e0; color:#2c3f8f;}

  .empty{text-align:center; color:#999; padding:50px; background:#fff; border-radius:10px;}

  /* 性別フィルター（セグメント） */
  .seg{display:inline-flex; border:1px solid #cfd6e4; border-radius:8px; overflow:hidden; background:#fff;}
  .seg button{border:none; background:#fff; padding:7px 18px; font-size:14px; font-weight:bold;
    color:#555; cursor:pointer; border-right:1px solid #e2e5ea;}
  .seg button:last-child{border-right:none;}
  .seg button.on{background:var(--btn); color:#fff;}
  .seg button[data-g="男子"].on{background:#1e63c4;}
  .seg button[data-g="女子"].on{background:#c43570;}

  /* 新着ポップアップ */
  .npop-overlay{display:none; position:fixed; inset:0; background:rgba(20,24,34,.55);
    z-index:200; align-items:center; justify-content:center; padding:20px;}
  .npop-overlay.show{display:flex;}
  .npop{background:#fff; border-radius:14px; width:min(560px, 94vw); max-height:82vh;
    display:flex; flex-direction:column; box-shadow:0 12px 40px rgba(0,0,0,.35);
    animation:popIn .22s ease;}
  @keyframes popIn{from{opacity:0; transform:scale(.94);} to{opacity:1; transform:none;}}
  .npop-head{display:flex; align-items:center; gap:10px; padding:16px 20px;
    font-size:18px; font-weight:bold; color:#7a5200; background:#fff8e1;
    border-bottom:2px solid #f0b429; border-radius:14px 14px 0 0;}
  .npop-head .nb-dot{width:14px; height:14px; border-radius:50%; background:#e08a00;
    animation:blink 1s infinite; flex:none;}
  @keyframes blink{0%,100%{opacity:1;} 50%{opacity:.25;}}
  .npop-list{overflow-y:auto; padding:10px 20px;}
  .npop-item{display:flex; align-items:center; gap:10px; padding:10px 4px;
    border-bottom:1px solid #eee; font-size:16px; flex-wrap:wrap;}
  .npop-item:last-child{border-bottom:none;}
  .npop-item b{font-size:17px;}
  .npop-ok{margin:14px 20px 18px; padding:14px; font-size:17px; font-weight:bold;
    border:none; border-radius:10px; background:var(--btn); color:#fff; cursor:pointer;}
  .npop-ok:active{opacity:.85;}

  /* 新着カードの強調（未反映のうち、直近の更新で届いたもの） */
  .card.arrived{border:2px solid #f0b429; border-left:8px solid #f0b429;
    box-shadow:0 0 0 3px rgba(240,180,41,.25);}
  .card.arrived .card-head::before{content:"NEW"; background:#e08a00; color:#fff;
    font-size:12px; font-weight:bold; padding:2px 10px; border-radius:10px; margin-right:4px;}
  #setup{background:#fff3cd; border:1px solid #e0c96a; padding:12px; border-radius:6px; margin:16px; font-size:14px; display:none;}
</style>
</head>
<body>

<div class="topbar">
  <h1 id="pageTitle">入力確認・訂正反映</h1>
  <a id="sheetLink" class="sheet-btn" href="#" target="_blank" rel="noopener">スプレッドシートを開く</a>
  <button id="reload" class="rbtn">更新</button>
</div>

<div id="setup">GAS_URL / API_TOKEN が未設定です。confirm.html 冒頭の設定を確認してください。</div>

<div class="wrap">
  <div class="bar">
    <div class="seg" id="genderSeg">
      <button type="button" data-g="all" class="on">全て</button>
      <button type="button" data-g="男子">男子</button>
      <button type="button" data-g="女子">女子</button>
    </div>
    <label><input type="checkbox" id="onlyNew"> 未反映のみ表示</label>
    <label><input type="checkbox" id="autoReload" checked> 自動更新（1分）</label>
    <label><input type="checkbox" id="soundOn" checked> 新着通知音</label>
    <label>表示:
      <select id="groupBy">
        <option value="none">時系列（新着順）</option>
        <option value="event">種目ごと</option>
      </select>
    </label>
    <label>反映済を折りたたむ:
      <select id="foldDelay">
        <option value="0">しない</option>
        <option value="30">30秒後</option>
        <option value="60" selected>1分後</option>
        <option value="180">3分後</option>
        <option value="600">10分後</option>
      </select>
    </label>
    <div class="counts">
      <span class="chip new" id="cNew">未反映 0</span>
      <span class="chip done" id="cDone">反映済 0</span>
      <span class="chip fold" id="cFold" style="display:none;"></span>
    </div>
    <span id="updated"></span>
  </div>

  <div class="copyhint">値をクリックすると、その数値がクリップボードにコピーされます（そのまま転記先システムに貼り付け）。</div>
  <div id="msg"></div>
  <div id="foldedArea"></div>
  <div id="listArea"></div>
</div>

<div id="newPopup" class="npop-overlay">
  <div class="npop">
    <div class="npop-head"><span class="nb-dot"></span>新着の入力・訂正（<span id="newPopupCount">0</span>件）</div>
    <div class="npop-list" id="newPopupList"></div>
    <button type="button" id="newPopupOk" class="npop-ok">OK（確認しました）</button>
  </div>
</div>

<script>
/* ===== 設定（index.html と同じ値を入れる） ===== */
const GAS_URL = "https://script.google.com/macros/s/AKfycbyk1FbQztLm9UzTeRTegSRkvVvyWSCuQu4a8u8cCFa91wKOPN-jM8Z7x5qz-kSfc8BE/exec";
const API_TOKEN = "5f8a9e2d7c1b4a6d3f0e8c9b2a1d4f7e";

let EVENT_ORDER = {
  "男子": ["ゆか","あん馬","つり輪","跳馬","平行棒","鉄棒"],
  "女子": ["跳馬１本目","跳馬２本目","段違い平行棒","平均台","ゆか"]
};

let records = [];
let busy = false;
let timer = null;
let foldTick = null;
let foldedOpen = false;
let knownRows = null;      // 前回取得時に存在した行番号のSet（初回はnull＝基準取り）
let arrivedAt = {};        // 行番号 → 新着として検知した時刻
const ARRIVED_HL_MS = 5*60*1000;  // NEW強調の表示時間（5分）
let baseTitle = document.title;
let newCount = 0;          // ポップアップをOKで閉じるまでの累計新着件数
let pendingNew = [];       // ポップアップに表示する新着レコード
let genderFilter = "all";  // "all" | "男子" | "女子"

const $ = id => document.getElementById(id);
const esc = s => String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

const REFLECT_AT_KEY = "confirm_reflectAt";
let reflectAt = {};
try{ reflectAt = JSON.parse(localStorage.getItem(REFLECT_AT_KEY) || "{}"); }catch(e){ reflectAt = {}; }
function saveReflectAt(){ localStorage.setItem(REFLECT_AT_KEY, JSON.stringify(reflectAt)); }

function toNum(v){ return (v===""||v==null||isNaN(Number(v))) ? null : Number(v); }
function disp3(v){ const n = toNum(v); return n==null ? null : n.toFixed(3); }

let settings = { title:"", judgesM:4, judgesW:4 };
function judgesFor(gender){
  const n = gender === "男子" ? settings.judgesM : settings.judgesW;
  return (n>=1 && n<=5) ? n : 4;
}
function trunc3(x){ return Math.floor(x*1000 + 1e-9)/1000; }
function calcE(values){
  const n = values.length;
  const s = [...values].sort((a,b)=>a-b);
  if(n === 1) return s[0];
  if(n === 2) return (s[0]+s[1])/2;
  if(n === 3) return trunc3((s[0]+s[1]+s[2])/3);
  if(n === 4) return (s[1]+s[2])/2;
  return trunc3((s[1]+s[2]+s[3])/3); // n=5
}

function finalOf(r){
  if(r.mode !== "入力") return null;
  const n = v => toNum(v) ?? 0;
  const jc = judgesFor(r.gender);
  const es = [];
  for(let i=1;i<=jc;i++) es.push(n(r["E"+i]));
  const E = calcE(es);
  const pen = n(r.shushin)+n(r.time)+n(r.line1)+n(r.line2);
  return Math.max(0, n(r.D)+n(r.katen)+n(r.SB)+E-pen);
}
function fmtTime(ts){
  if(!ts) return "";
  return new Date(ts).toLocaleString("ja-JP",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit"});
}
function foldSeconds(){ return Number($("foldDelay").value) || 0; }

function fld(cls, label, rawVal){
  const d = disp3(rawVal);
  const shown = d==null ? "－" : d;
  const copy  = d==null ? "" : d;
  const vcls = "v" + (d==null ? " empty" : "");
  return `<div class="fld ${cls}" data-copy="${esc(copy)}">`
       + `<div class="k">${esc(label)}</div><div class="${vcls}">${esc(shown)}</div></div>`;
}

function renderCard(r){
  const isArrived = !r.reflected && arrivedAt[r.row]
    && (Date.now() - arrivedAt[r.row]) < ARRIVED_HL_MS;
  const cls = (r.reflected ? "done" : "new") + (r.mode==="訂正" ? " corr" : "")
    + (isArrived ? " arrived" : "");
  const gcls = r.gender === "男子" ? "m" : (r.gender === "女子" ? "w" : "");
  const modeTag = r.mode==="入力"
    ? '<span class="tag in">入力</span>'
    : '<span class="tag co">訂正</span>';

  const jc = judgesFor(r.gender);
  let left = fld("d","D",r.D);
  for(let i=1;i<=jc;i++) left += fld("","E"+i, r["E"+i]);
  const right = fld("pen","PEN.（LINE1）",r.line1)
    + fld("pen","PEN.（LINE2）",r.line2)
    + fld("pen","PEN.（TIME）",r.time)
    + fld("pen","PEN.（主審）",r.shushin)
    + fld("calc","加点（SB以外）",r.katen)
    + fld("calc","Stick Bonus",r.SB);

  const f = finalOf(r);
  const finalHtml = f==null
    ? '<span class="final">決定点<b>－</b></span>'
    : `<span class="final">決定点<b>${f.toFixed(3)}</b></span>`;

  return `<div class="card ${cls}">
    <div class="ev-banner ${gcls}">
      <span class="ev-gender">${esc(r.gender)}</span>
      <span class="ev-name">${esc(r.event)}</span>
    </div>
    <div class="card-head">
      <div class="bib">${esc(r.bib)}</div>
      <div class="who">
        <div class="nm">${esc(r.playerName) || "（選手名なし）"}</div>
        <div class="sub">${esc(r.team)}</div>
      </div>
      <div class="tags">${modeTag}<span class="tstamp">${fmtTime(r.ts)}</span></div>
    </div>
    <div class="card-body">
      <div class="col left">${left}</div>
      <div class="col right">${right}</div>
    </div>
    <div class="card-foot">
      ${finalHtml}
      <label class="approve-lbl${r.approved ? " on" : ""}">
        <input type="checkbox" class="cb-approve" data-row="${r.row}" ${r.approved?"checked":""}>
        審判長承認
      </label>
      <label class="reflect-lbl">
        <input type="checkbox" class="cb-reflect" data-row="${r.row}" ${r.reflected?"checked":""}>
        ${r.reflected ? "入力済み" : "入力済みにする"}
      </label>
    </div>
  </div>`;
}

function bindCards(container){
  container.querySelectorAll('.fld[data-copy]').forEach(el=>{
    el.addEventListener("click", ()=>{
      const val = el.dataset.copy;
      if(!val) return;
      copyText(val, el);
    });
  });
  container.querySelectorAll('input.cb-reflect[data-row]').forEach(cb=>{
    cb.addEventListener("change", ()=>toggleReflect(cb));
  });
  container.querySelectorAll('input.cb-approve[data-row]').forEach(cb=>{
    cb.addEventListener("change", ()=>toggleApproved(cb));
  });
}

function copyText(text, el){
  const ok = ()=>{
    el.classList.add("copied");
    setTimeout(()=>el.classList.remove("copied"), 1000);
    showToast("コピーしました：" + text, true);
  };
  const ng = ()=>{ showToast("コピーできませんでした。値を選択して手動でコピーしてください。", false); };

  if(navigator.clipboard && navigator.clipboard.writeText && window.isSecureContext){
    navigator.clipboard.writeText(text).then(ok).catch(()=>{ if(!fallbackCopy(text)) ng(); else ok(); });
  }else{
    if(fallbackCopy(text)) ok(); else ng();
  }
}
function fallbackCopy(text){
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position="fixed"; ta.style.top="0"; ta.style.left="0"; ta.style.opacity="0";
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  let ok = false;
  try{ ok = document.execCommand("copy"); }catch(e){ ok = false; }
  document.body.removeChild(ta);
  return ok;
}

let toastTimer = null;
function showToast(text, ok){
  let t = document.getElementById("toast");
  if(!t){
    t = document.createElement("div");
    t.id = "toast";
    document.body.appendChild(t);
  }
  t.textContent = text;
  t.className = ok ? "ok" : "ng";
  t.classList.add("show");
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ t.classList.remove("show"); }, 1600);
}

async function load(){
  const msg = $("msg");
  if(!GAS_URL || !API_TOKEN){ $("setup").style.display="block"; return; }
  msg.className=""; msg.textContent="読み込み中…";
  try{
    const res = await fetch(GAS_URL + "?action=records&token=" + encodeURIComponent(API_TOKEN) + "&limit=300");
    const data = await res.json();
    if(!data.ok){ msg.className="err"; msg.textContent="取得エラー: " + (data.error||"不明"); return; }
    records = data.records || [];
    detectNew(records);
    if(data.sheetUrl) $("sheetLink").href = data.sheetUrl;
    if(data.settings){
      settings = data.settings;
      if(settings.eventsM && settings.eventsM.length) EVENT_ORDER["男子"] = settings.eventsM;
      if(settings.eventsW && settings.eventsW.length) EVENT_ORDER["女子"] = settings.eventsW;
      if(settings.title){
        $("pageTitle").textContent = settings.title + "　入力確認・訂正反映";
        baseTitle = settings.title + " 入力確認・訂正反映";
        document.title = (newCount > 0 ? `【新着${newCount}】` : "") + baseTitle;
      }
    }
    $("updated").textContent = "最終更新 " + new Date().toLocaleTimeString("ja-JP");
    msg.textContent="";
    render();
  }catch(e){
    msg.className="err"; msg.textContent="取得失敗（GAS_URL・デプロイ設定を確認）";
  }
}

/* ===== 新着検知（スプレッドシートへの書き込みを行番号の増分で検知） ===== */
function detectNew(recs){
  const rowsNow = new Set(recs.map(r => r.row));
  if(knownRows){
    const fresh = recs.filter(r => !knownRows.has(r.row));
    if(fresh.length){
      const now = Date.now();
      fresh.forEach(r => { arrivedAt[r.row] = now; });
      notifyNew(fresh);
    }
  }
  knownRows = rowsNow;  // 初回読み込みは基準取りのみ（通知しない）
}

function notifyNew(fresh){
  newCount += fresh.length;
  pendingNew = pendingNew.concat(fresh);
  $("newPopupList").innerHTML = pendingNew.map(r=>{
    const modeTag = r.mode==="訂正"
      ? '<span class="tag co">訂正</span>' : '<span class="tag in">入力</span>';
    const nm = esc(r.playerName) || "（選手名なし）";
    const tm = esc(r.team) ? `（${esc(r.team)}）` : "";
    return `<div class="npop-item">${modeTag}<b>${esc(r.gender)} ${esc(r.event)}</b>`
      + `<span>No.${esc(r.bib)}　${nm}${tm}</span></div>`;
  }).join("");
  $("newPopupCount").textContent = pendingNew.length;
  $("newPopup").classList.add("show");
  document.title = `【新着${newCount}】` + baseTitle;
  chime();
}

function dismissPopup(){
  newCount = 0;
  pendingNew = [];
  $("newPopup").classList.remove("show");
  document.title = baseTitle;
}

let audioCtx = null;
function ensureAudio(){
  try{
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === "suspended") audioCtx.resume();
  }catch(e){}
}
function chime(){
  if(!$("soundOn").checked) return;
  ensureAudio();
  if(!audioCtx) return;
  try{
    const t0 = audioCtx.currentTime;
    [[880,0],[1174.66,0.18]].forEach(([f,dt])=>{
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = "sine"; o.frequency.value = f;
      g.gain.setValueAtTime(0.0001, t0+dt);
      g.gain.exponentialRampToValueAtTime(0.35, t0+dt+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t0+dt+0.5);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t0+dt); o.stop(t0+dt+0.55);
    });
  }catch(e){}
}

function render(){
  const onlyNew = $("onlyNew").checked;
  const groupBy = $("groupBy").value;
  const foldSec = foldSeconds();
  const now = Date.now();

  const base = genderFilter === "all"
    ? records.slice()
    : records.filter(r => r.gender === genderFilter);

  const total = base.length;
  const doneCount = base.filter(r=>r.reflected).length;
  $("cNew").textContent  = "未反映 " + (total - doneCount);
  $("cDone").textContent = "反映済 " + doneCount;

  const shouldFold = r => {
    if(!r.reflected || foldSec <= 0) return false;
    const t = reflectAt[r.row];
    if(!t) return true;
    return (now - t) >= foldSec * 1000;
  };

  let rows = base;
  const foldedRows = onlyNew ? [] : rows.filter(shouldFold);
  rows = rows.filter(r => !shouldFold(r));
  if(onlyNew) rows = rows.filter(r=>!r.reflected);

  renderFolded(foldedRows);

  const area = $("listArea");
  if(!rows.length){
    area.innerHTML = '<div class="empty">'
      + (onlyNew ? "未反映のレコードはありません。" : "表示するレコードがありません。") + '</div>';
    return;
  }

  if(groupBy === "event"){
    const key = r => r.gender + " " + r.event;
    const order = [];
    ["男子","女子"].forEach(g => EVENT_ORDER[g].forEach(ev => order.push(g+" "+ev)));
    const groups = {};
    rows.forEach(r => { (groups[key(r)] = groups[key(r)]||[]).push(r); });
    let html = "";
    const emit = k => {
      const list = groups[k];
      const unref = list.filter(r=>!r.reflected).length;
      const badge = unref > 0
        ? `<span class="grp-badge">未反映 ${unref}</span>`
        : `<span class="grp-badge done">完了</span>`;
      html += `<div class="grp-head">${esc(k)}<span class="grp-total">（${list.length}件）</span>${badge}</div>`;
      html += list.map(renderCard).join("");
    };
    const seen = new Set();
    order.forEach(k => { if(groups[k]){ seen.add(k); emit(k); } });
    Object.keys(groups).forEach(k => { if(!seen.has(k)) emit(k); });
    area.innerHTML = html;
  }else{
    area.innerHTML = rows.map(renderCard).join("");
  }
  bindCards(area);
}

function renderFolded(foldedRows){
  const area = $("foldedArea");
  const chip = $("cFold");
  if(!foldedRows.length){ area.innerHTML=""; chip.style.display="none"; return; }
  chip.style.display=""; chip.textContent = "折りたたみ " + foldedRows.length;
  area.innerHTML =
    `<button class="fold-toggle${foldedOpen?" open":""}" id="foldToggle">`
    + `<span class="arrow">▶</span>反映済みで折りたたみ中（${foldedRows.length}件）</button>`
    + `<div id="foldedList"${foldedOpen?' class="open"':''}>${foldedRows.map(renderCard).join("")}</div>`;
  $("foldToggle").addEventListener("click", ()=>{
    foldedOpen = !foldedOpen;
    $("foldToggle").classList.toggle("open", foldedOpen);
    $("foldedList").classList.toggle("open", foldedOpen);
  });
  bindCards($("foldedList"));
}

async function toggleReflect(cb){
  if(busy){ cb.checked = !cb.checked; return; }
  const row = Number(cb.dataset.row);
  const reflected = cb.checked;
  busy = true; cb.disabled = true;
  const msg = $("msg"); msg.className=""; msg.textContent="更新中…";
  try{
    const res = await fetch(GAS_URL, {
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify({token:API_TOKEN, action:"markReflected", row:row, reflected:reflected})
    });
    const data = await res.json();
    if(data.ok){
      const rec = records.find(r=>r.row===row);
      if(rec) rec.reflected = reflected;
      if(reflected){ reflectAt[row] = Date.now(); } else { delete reflectAt[row]; }
      saveReflectAt();
      msg.className="ok"; msg.textContent = reflected ? "反映済みにしました" : "未反映に戻しました";
      render();
    }else{
      cb.checked = !reflected; msg.className="err"; msg.textContent="更新エラー: "+(data.error||"不明");
    }
  }catch(e){
    cb.checked = !reflected; msg.className="err"; msg.textContent="更新に失敗しました";
  }finally{
    busy = false;
  }
}

async function toggleApproved(cb){
  if(busy){ cb.checked = !cb.checked; return; }
  const row = Number(cb.dataset.row);
  const approved = cb.checked;
  busy = true; cb.disabled = true;
  const msg = $("msg"); msg.className=""; msg.textContent="更新中…";
  try{
    const res = await fetch(GAS_URL, {
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify({token:API_TOKEN, action:"markApproved", row:row, approved:approved})
    });
    const data = await res.json();
    if(data.ok){
      const rec = records.find(r=>r.row===row);
      if(rec) rec.approved = approved;
      msg.className="ok"; msg.textContent = approved ? "審判長承認を記録しました" : "審判長承認を取り消しました";
      render();
    }else{
      cb.checked = !approved; msg.className="err";
      msg.textContent = "承認の更新エラー: " + (data.error||"不明")
        + "（Code.gsにmarkApprovedを追加して再デプロイしてください）";
    }
  }catch(e){
    cb.checked = !approved; msg.className="err"; msg.textContent="承認の更新に失敗しました";
  }finally{
    busy = false;
  }
}

function setAutoReload(){
  if(timer){ clearInterval(timer); timer=null; }
  if($("autoReload").checked) timer = setInterval(load, 60000);
}
function setFoldTick(){
  if(foldTick){ clearInterval(foldTick); foldTick=null; }
  if(foldSeconds() > 0) foldTick = setInterval(render, 5000);
}

$("reload").addEventListener("click", load);
$("onlyNew").addEventListener("change", render);
$("groupBy").addEventListener("change", render);
$("foldDelay").addEventListener("change", ()=>{ setFoldTick(); render(); });
$("autoReload").addEventListener("change", setAutoReload);
$("genderSeg").querySelectorAll("button").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    genderFilter = btn.dataset.g;
    $("genderSeg").querySelectorAll("button").forEach(b=>b.classList.toggle("on", b===btn));
    render();
  });
});
$("newPopupOk").addEventListener("click", dismissPopup);
document.addEventListener("pointerdown", ensureAudio, true);
if(!GAS_URL || !API_TOKEN) $("setup").style.display="block";
setAutoReload();
setFoldTick();
load();
</script>
