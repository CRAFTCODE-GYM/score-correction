<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>得点修正・送信</title>
<style>
  :root{
    --ink:#1a1a1a; --line:#333; --panel-blue:#dfe3f5; --panel-blue-ink:#3f51b5;
    --d-bg:#d9e8e6; --d-ink:#7a9a96; --e-bg:#5f7d7a; --final-bg:#b23a2a;
    --btn:#4d79e6; --btn-hover:#3a63cc; --gray:#eee; --warn:#c0392b; --ok:#2e7d32;
    --next:#22a04a; --next-press:#188038;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:"Helvetica Neue",Arial,"Hiragino Kaku Gothic ProN","Hiragino Sans",Meiryo,sans-serif;
    color:var(--ink); background:#fafafa; padding:16px; max-width:1100px; margin:0 auto;
    touch-action:manipulation;}

  .pagehead{display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; margin-bottom:8px;}
  .pagehead h1{font-size:19px;}
  #tournTitle{font-size:15px; color:#3f51b5; font-weight:bold;}

  /* タブ */
  .tabs{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px;}
  .tabs .tab{padding:8px 22px; border:1px solid #bbb; background:#fff; cursor:pointer;
    border-radius:6px 6px 0 0; font-size:15px; user-select:none;}
  .tabs .tab.active{background:var(--btn); color:#fff; border-color:var(--btn); font-weight:bold;}
  .box.kp-active{outline:3px solid #0b7bef; outline-offset:1px;}
  .box.kp-active .lbl{background:#0b7bef; color:#fff;}
  .tabs.mode-tabs .tab.active.correction{background:#e6a817; border-color:#e6a817; color:#111;}

  .card{background:#fff; border:1px solid #ddd; border-radius:8px; padding:20px; margin-top:6px;}

  /* ヘッダ行：モード表示・ゼッケン・選手 */
  .head{display:flex; align-items:stretch; gap:14px; margin-bottom:6px;}
  .ctx{display:flex; flex-direction:column; justify-content:center; min-width:70px; font-size:17px; line-height:1.6;}
  .mode-badge{display:inline-block; padding:2px 12px; font-weight:bold; font-size:16px; margin-top:8px; width:fit-content;}
  .mode-badge.input{background:#8ee65c;}
  .mode-badge.correction{background:#ffe95c; color:var(--warn);}
  .bib-wrap{display:flex; flex-direction:column;}
  .bib-wrap label{font-size:14px; text-align:center; margin-bottom:2px;}
  #bib{width:130px; height:76px; font-size:34px; text-align:center; border:1px solid var(--line);}
  .player{flex:1; display:flex; flex-direction:column; border:1px solid var(--panel-blue-ink);}
  .player div{flex:1; display:flex; align-items:center; justify-content:center;
    background:var(--panel-blue); color:var(--panel-blue-ink); font-size:22px;}
  .player div + div{border-top:1px solid var(--panel-blue-ink);}
  .player.found div{color:#111; font-weight:bold;}
  .player.notfound div{color:var(--warn);}

  /* スコアボックス */
  .grid{display:grid; grid-template-columns:repeat(5,1fr); gap:14px; margin-top:18px;}
  .box{border:1px solid var(--line); display:flex; flex-direction:column; min-width:0;}
  .box .lbl{border-bottom:1px solid var(--line); text-align:center; font-size:15px; padding:4px;
    white-space:nowrap; overflow:hidden;}
  .box input{border:none; width:100%; flex:1; min-height:64px; font-size:32px; text-align:center; outline:none; background:transparent;}
  .box input:focus{background:#fffbe0;}
  .box.calc .lbl{color:#fff; font-weight:bold;}
  .box.calc .val{flex:1; min-height:64px; display:flex; align-items:center; justify-content:center; font-size:32px; font-weight:bold; color:#fff;}
  .box.dscore{background:var(--d-bg);} .box.dscore .lbl{color:var(--d-ink); font-weight:bold; border-color:var(--line);}
  .box.dscore input{color:var(--d-ink); font-weight:bold;}
  .box.escore{background:var(--e-bg);} .box.escore .lbl{border-color:#fff;}
  .box.final{background:var(--final-bg); grid-column:span 2;} .box.final .lbl{border-color:#fff;}
  .box.final .val{font-size:38px;}
  .box.pen{background:var(--gray);}
  /* E欄が多い（審判5人=6セル）ときは文字を詰めて改行させない */
  .grid.cols6 .box input, .grid.cols6 .box .val{font-size:26px;}
  .grid.cols6 .box .lbl{font-size:13px;}

  /* 送信 */
  .actions{display:flex; gap:10px; margin-top:22px;}
  #send{flex:1; padding:16px; font-size:22px; font-weight:bold;
    color:#fff; background:var(--btn); border:none; border-radius:4px; cursor:pointer;}
  #send:hover{background:var(--btn-hover);}
  #send:disabled{background:#aaa; cursor:not-allowed;}
  #zeroFill{width:150px; padding:16px 10px; font-size:18px; font-weight:bold;
    color:#333; background:#e0e0e0; border:1px solid #bbb; border-radius:4px; cursor:pointer;}
  #zeroFill:hover{background:#d0d0d0;}

  #status{margin-top:10px; text-align:center; font-size:16px; min-height:24px;}
  #status.ok{color:var(--ok); font-weight:bold;} #status.err{color:var(--warn); font-weight:bold;}

  /* 直近レコード表示 */
  #lastRecord{display:none; margin-top:14px; border:1px solid #c9d3ee; border-radius:8px;
    background:#f4f7ff; padding:12px 14px;}
  #lastRecord .lr-head{font-size:13px; color:#5a6ba8; font-weight:bold; margin-bottom:8px;}
  #lastRecord .lr-body{display:flex; flex-wrap:wrap; gap:6px 16px; font-size:15px;}
  #lastRecord .lr-item{white-space:nowrap;}
  #lastRecord .lr-item b{color:#333;}
  #lastRecord .lr-item .k{color:#888; font-size:12px; margin-right:3px;}
  #lastRecord .lr-final{color:var(--final-bg); font-weight:bold;}

  .toolbar{display:flex; justify-content:flex-end; gap:10px; margin-top:14px; font-size:13px; color:#666;}
  .toolbar button{font-size:13px; padding:4px 10px; cursor:pointer;}
  #setup{background:#fff3cd; border:1px solid #e0c96a; padding:12px; border-radius:6px; margin-bottom:12px; font-size:14px; display:none;}

  /* ===== タブレット（タッチ端末）向け ===== */
  @media (pointer:coarse){
    body{padding:10px;}
    .card{padding:14px;}
    .grid{margin-top:12px; gap:10px;}
    .tabs .tab{padding:12px 22px; font-size:17px;}
    .box .lbl{font-size:16px; padding:6px;}
    .box input, .box .val{min-height:64px;}
    #bib{height:84px;}
    #send{padding:18px; font-size:24px;}
    #zeroFill{font-size:19px;}
    .toolbar button{font-size:16px; padding:10px 16px;}
  }
  @media (max-width:900px){
    .grid{gap:8px;}
    .box .lbl{font-size:13px; padding:4px 2px;}
    .box input, .box .val{font-size:24px; min-height:56px;}
    .box.final .val{font-size:28px;}
    .grid.cols6 .box input, .grid.cols6 .box .val{font-size:19px;}
    .grid.cols6 .box .lbl{font-size:11px;}
    .player div{font-size:18px;}
  }

  /* ===== 中央モーダル式テンキー（タッチ端末のみ） ===== */
  #kpOverlay{display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:80;
    align-items:center; justify-content:center; padding:14px;}
  #kpOverlay.open{display:flex;}
  #kpOverlay.closing{opacity:0;} /* 閉じ際もクリックを吸収してゴーストクリックを防ぐ */
  #keypad{background:#fff; border-radius:16px; width:100%; max-width:430px;
    box-shadow:0 10px 40px rgba(0,0,0,.35); padding:18px 18px 16px;}
  .kp-head{text-align:center; margin-bottom:8px;}
  .kp-player{font-size:18px; font-weight:bold;}
  .kp-sub{font-size:12px; color:#888; margin-top:2px;}
  .kp-field{font-size:16px; font-weight:bold; margin-top:6px;}
  .kp-field.is-e{font-size:19px; color:#fff; background:#0b7bef; border-radius:8px;
    padding:6px 10px; display:inline-block;}
  .kp-range{font-size:12px; color:#888; margin-top:2px; min-height:15px;}
  .kp-hr{border:none; border-top:1px solid #ddd; margin:10px 0;}
  .kp-display{border:2px solid var(--btn); background:#f4f6f8; border-radius:8px;
    height:56px; display:flex; align-items:center; justify-content:center;
    font-size:30px; font-weight:bold; margin-bottom:12px; font-variant-numeric:tabular-nums;}
  .kp-grid{display:grid; grid-template-columns:repeat(12,1fr); gap:10px;}
  .kp-grid button{border:none; border-radius:10px; height:60px; font-size:24px; font-weight:bold;
    cursor:pointer; color:#fff; background:#0b7bef;}
  .kp-grid button:active{filter:brightness(.85);}
  .kp-grid .num{grid-column:span 4;}
  .kp-grid .b6{grid-column:span 4;}
  .kp-grid .dot{grid-column:span 12;}
  .kp-grid .next{background:var(--next); font-size:18px;}
  .kp-grid .next:active{background:var(--next-press);}
  .kp-grid .bs{background:#e23b3b;}
  #kpDone{width:100%; margin-top:12px; height:54px; border:none; border-radius:10px;
    background:#7a8494; color:#fff; font-size:20px; font-weight:bold; cursor:pointer;}
  #kpDone:active{background:#5f6877;}
</style>
</head>
<body>

<div id="setup">
  Apps ScriptのウェブアプリURLが設定されていません。index.html内の <code>GAS_URL</code> と <code>API_TOKEN</code> を設定してください。
</div>

<div class="pagehead">
  <h1>得点修正・送信</h1>
  <span id="tournTitle"></span>
</div>

<!-- 性別タブ -->
<div class="tabs" id="genderTabs"></div>
<!-- 種目タブ -->
<div class="tabs" id="eventTabs"></div>
<!-- モードタブ -->
<div class="tabs mode-tabs" id="modeTabs"></div>

<div class="card">
  <div class="head">
    <div class="ctx">
      <span id="ctxGender">女子</span>
      <span id="ctxEvent">ゆか</span>
      <span class="mode-badge input" id="modeBadge">入力</span>
    </div>
    <div class="bib-wrap">
      <label>ゼッケン</label>
      <input id="bib" type="text" inputmode="numeric" autocomplete="off">
    </div>
    <div class="player" id="playerBox">
      <div id="playerName">選手名</div>
      <div id="playerTeam">所属（○○県）</div>
    </div>
  </div>

  <div class="grid" id="row1">
    <div class="box dscore"><div class="lbl">Dスコア</div><input id="f_D" type="number" step="0.1" min="0"></div>
    <div class="box"><div class="lbl">高体連加点</div><input id="f_katen" type="number" step="0.1" min="0"></div>
    <div class="box"><div class="lbl">SB</div><input id="f_SB" type="number" step="0.1" min="0"></div>
    <div class="box calc final" id="finalBox"><div class="lbl">決定点</div><div class="val" id="finalVal">-</div></div>
  </div>

  <!-- E欄（審判数に応じて動的生成） -->
  <div class="grid" id="eRow"></div>

  <div class="grid">
    <div class="box"><div class="lbl">減点</div><input id="f_shushin" type="number" step="0.1" min="0"></div>
    <div class="box"><div class="lbl">TIME</div><input id="f_time" type="number" step="0.1" min="0"></div>
    <div class="box"><div class="lbl">LINE1</div><input id="f_line1" type="number" step="0.1" min="0"></div>
    <div class="box"><div class="lbl">LINE2</div><input id="f_line2" type="number" step="0.1" min="0"></div>
    <div class="box calc pen" id="penBox"><div class="lbl" style="color:#333">ペナルティ</div><div class="val" id="penVal" style="color:#333">-</div></div>
  </div>

  <div class="actions">
    <button id="zeroFill" type="button">0点処理</button>
    <button id="send" type="button">本部記録へ送信</button>
  </div>
  <div id="status"></div>

  <div id="lastRecord"></div>

  <div class="toolbar">
    <span id="cacheInfo"></span>
    <button id="reloadPlayers" type="button">選手データ更新</button>
  </div>
</div>

<!-- 中央モーダル式テンキー（タッチ端末用） -->
<div id="kpOverlay">
  <div id="keypad">
    <div class="kp-head">
      <div class="kp-player" id="kpPlayer">－</div>
      <div class="kp-sub" id="kpSub"></div>
      <div class="kp-field" id="kpField"></div>
      <div class="kp-range" id="kpRange"></div>
    </div>
    <hr class="kp-hr">
    <div class="kp-display" id="kpDisplay"></div>
    <div class="kp-grid">
      <button type="button" class="num" data-k="7">7</button>
      <button type="button" class="num" data-k="8">8</button>
      <button type="button" class="num" data-k="9">9</button>
      <button type="button" class="num" data-k="4">4</button>
      <button type="button" class="num" data-k="5">5</button>
      <button type="button" class="num" data-k="6">6</button>
      <button type="button" class="num" data-k="1">1</button>
      <button type="button" class="num" data-k="2">2</button>
      <button type="button" class="num" data-k="3">3</button>
      <button type="button" class="num" data-k="0">0</button>
      <button type="button" class="b6 next" data-k="next">次へ</button>
      <button type="button" class="b6 bs" data-k="bs">⌫</button>
      <button type="button" class="num dot" data-k=".">.</button>
    </div>
    <button type="button" id="kpDone">決定</button>
  </div>
</div>

<script>
/* ================= 設定 =================
   Apps Script をウェブアプリとしてデプロイし、URL（…/exec）を貼り付ける。
   API_TOKEN は Code.gs 側と同じ文字列を設定する。 */
const GAS_URL = "https://script.google.com/macros/s/AKfycbyk1FbQztLm9UzTeRTegSRkvVvyWSCuQu4a8u8cCFa91wKOPN-jM8Z7x5qz-kSfc8BE/exec";
const API_TOKEN = "5f8a9e2d7c1b4a6d3f0e8c9b2a1d4f7e";

/* ================= 定数 ================= */
// 種目は設定シートの4行目(男子)・5行目(女子)から取得する。取得前は既定値を使う。
let EVENTS = {
  "男子": ["ゆか","あん馬","つり輪","跳馬","平行棒","鉄棒"],
  "女子": ["跳馬１本目","跳馬２本目","段違い平行棒","平均台","ゆか"]
};
const MAX_JUDGES = 5;
const FIELD_LABELS = {
  bib:"ゼッケン", f_D:"Dスコア", f_katen:"高体連加点", f_SB:"SB",
  f_E1:"E1", f_E2:"E2", f_E3:"E3", f_E4:"E4", f_E5:"E5",
  f_shushin:"減点", f_time:"TIME", f_line1:"LINE1", f_line2:"LINE2"
};
const RANGE_HINTS = {
  f_D:"0.0 〜 15.0", f_katen:"0.0 〜 5.0", f_SB:"0.0 〜 1.0",
  f_E1:"0.0 〜 10.0", f_E2:"0.0 〜 10.0", f_E3:"0.0 〜 10.0", f_E4:"0.0 〜 10.0", f_E5:"0.0 〜 10.0",
  f_shushin:"0.0 〜 5.0", f_time:"0.0 〜 5.0", f_line1:"0.0 〜 5.0", f_line2:"0.0 〜 5.0"
};

/* ================= 状態（リロード後も保持） ================= */
const state = {
  gender: localStorage.getItem("sc_gender") || "女子",
  event:  localStorage.getItem("sc_event")  || "",
  mode:   localStorage.getItem("sc_mode")   || "入力"
};
if(!EVENTS[state.gender].includes(state.event)) state.event = EVENTS[state.gender][0];

let players = {"男子":[], "女子":[]};
let settings = { title:"", judgesM:4, judgesW:4 };

/* 現在の性別の審判数（1〜5） */
function judgeCount(){
  const n = state.gender === "男子" ? settings.judgesM : settings.judgesW;
  return (n>=1 && n<=MAX_JUDGES) ? n : 4;
}
/* 現在有効なフィールドID一覧 */
function eIds(){
  const ids=[]; for(let i=1;i<=judgeCount();i++) ids.push("f_E"+i); return ids;
}
function scoreIds(){
  return ["f_D","f_katen","f_SB", ...eIds(), "f_shushin","f_time","f_line1","f_line2"];
}
function fieldOrder(){ return ["bib", ...scoreIds()]; }

/* ================= タブ描画 ================= */
function renderTabs(){
  const g = document.getElementById("genderTabs");
  g.innerHTML = "";
  ["男子","女子"].forEach(x=>{
    const b = document.createElement("div");
    b.className = "tab" + (x===state.gender ? " active" : "");
    b.textContent = x;
    b.onclick = ()=>{ state.gender = x;
      if(!EVENTS[x].includes(state.event)) state.event = EVENTS[x][0];
      saveState(); renderTabs(); buildERow(); refreshContext(); lookupPlayer(); recalc(); };
    g.appendChild(b);
  });
  const e = document.getElementById("eventTabs");
  e.innerHTML = "";
  EVENTS[state.gender].forEach(x=>{
    const b = document.createElement("div");
    b.className = "tab" + (x===state.event ? " active" : "");
    b.textContent = x;
    b.onclick = ()=>{ state.event = x; saveState(); renderTabs(); refreshContext(); };
    e.appendChild(b);
  });
  const m = document.getElementById("modeTabs");
  m.innerHTML = "";
  ["入力","訂正"].forEach(x=>{
    const b = document.createElement("div");
    b.className = "tab" + (x===state.mode ? " active" : "") + (x==="訂正" ? " correction" : "");
    b.textContent = x==="入力" ? "得点入力" : "得点訂正";
    b.onclick = ()=>{ state.mode = x; saveState(); renderTabs(); refreshContext(); recalc(); };
    m.appendChild(b);
  });
}
function saveState(){
  localStorage.setItem("sc_gender", state.gender);
  localStorage.setItem("sc_event",  state.event);
  localStorage.setItem("sc_mode",   state.mode);
}
function refreshContext(){
  document.getElementById("ctxGender").textContent = state.gender;
  document.getElementById("ctxEvent").textContent  = state.event;
  const badge = document.getElementById("modeBadge");
  badge.textContent = state.mode;
  badge.className = "mode-badge " + (state.mode==="入力" ? "input" : "correction");
  const hide = state.mode === "訂正";
  document.getElementById("finalBox").style.visibility  = hide ? "hidden" : "visible";
  const esc = document.getElementById("escoreBox");
  if(esc) esc.style.visibility = hide ? "hidden" : "visible";
  document.getElementById("penBox").style.visibility    = hide ? "hidden" : "visible";
  document.getElementById("zeroFill").style.display     = hide ? "none" : "block";
}
function applySettingsToHeader(){
  document.getElementById("tournTitle").textContent = settings.title || "";
  document.title = (settings.title ? settings.title + " " : "") + "得点修正・送信";
}

/* ================= E欄の動的生成（審判数に応じて可変） ================= */
function buildERow(){
  const n = judgeCount();
  const row = document.getElementById("eRow");
  // 保持できる値は引き継ぐ
  const prev = {};
  row.querySelectorAll("input").forEach(inp => prev[inp.id] = inp.value);

  let html = "";
  for(let i=1;i<=n;i++){
    html += `<div class="box"><div class="lbl">E${i}</div>`
          + `<input id="f_E${i}" type="number" step="0.1" min="0"></div>`;
  }
  html += `<div class="box calc escore" id="escoreBox"><div class="lbl">Eスコア</div><div class="val" id="escoreVal">-</div></div>`;
  row.innerHTML = html;
  // 列数 = E×n + Eスコア。1行に収まるよう列テンプレートを直接指定
  row.style.gridTemplateColumns = `repeat(${n+1}, 1fr)`;
  row.classList.toggle("cols6", n+1 >= 6);

  // 値の復元・リスナー再登録
  for(let i=1;i<=n;i++){
    const el = document.getElementById("f_E"+i);
    if(prev["f_E"+i] !== undefined) el.value = prev["f_E"+i];
    el.addEventListener("input", recalc);
    el.addEventListener("blur", ()=>{ formatEField("f_E"+i); recalc(); });
  }
  if(IS_TOUCH) touchifyFields(eIds());
  refreshContext();
}

/* ================= 選手データ・設定の取得 ================= */
function loadPlayersFromCache(){
  try{
    const c = JSON.parse(localStorage.getItem("sc_players") || "null");
    if(c && c.players){
      players = c.players;
      if(c.settings) settings = c.settings;
      showCacheInfo(c.time);
      return true;
    }
  }catch(e){}
  return false;
}
function showCacheInfo(t){
  const info = document.getElementById("cacheInfo");
  info.style.color = "";
  info.textContent = t ? "選手データ取得: " + new Date(t).toLocaleString("ja-JP") : "";
}
async function fetchPlayers(force){
  const info = document.getElementById("cacheInfo");
  if(!GAS_URL) return;
  if(!force && loadPlayersFromCache()){
    const c = JSON.parse(localStorage.getItem("sc_players"));
    if(Date.now() - c.time < 60*60*1000){ afterSettings(); return; }
  }
  try{
    const res = await fetch(GAS_URL + "?action=players&token=" + encodeURIComponent(API_TOKEN));
    const data = await res.json();
    if(data.ok){
      players = data.players;
      if(data.settings) settings = data.settings;
      localStorage.setItem("sc_players", JSON.stringify({time:Date.now(), players, settings}));
      showCacheInfo(Date.now());
      afterSettings();
      lookupPlayer();
    }else{
      info.style.color = "#c0392b";
      info.textContent = data.error === "unauthorized"
        ? "選手データ取得エラー: トークン不一致（index.htmlとCode.gsのAPI_TOKENを確認）"
        : "選手データ取得エラー: " + (data.error || "不明");
    }
  }catch(e){
    info.style.color = "#c0392b";
    info.textContent = "選手データ取得失敗（GAS_URL・デプロイ設定を確認）";
  }
}
function applyEventsFromSettings(){
  if(settings.eventsM && settings.eventsM.length) EVENTS["男子"] = settings.eventsM;
  if(settings.eventsW && settings.eventsW.length) EVENTS["女子"] = settings.eventsW;
  // 現在選択中の種目が新リストに無ければ先頭に寄せる
  if(!EVENTS[state.gender].includes(state.event)){
    state.event = EVENTS[state.gender][0];
    saveState();
  }
}
function afterSettings(){
  applyEventsFromSettings();
  applySettingsToHeader();
  renderTabs();
  buildERow();
  refreshContext();
  recalc();
}

let currentPlayer = null;
function lookupPlayer(){
  const bib = document.getElementById("bib").value.trim();
  const box  = document.getElementById("playerBox");
  const nameEl = document.getElementById("playerName");
  const teamEl = document.getElementById("playerTeam");
  currentPlayer = null;
  if(!bib){ box.className="player"; nameEl.textContent="選手名"; teamEl.textContent="所属（○○県）"; return; }
  const p = (players[state.gender]||[]).find(x => String(x.bib) === bib);
  if(p){
    currentPlayer = p;
    box.className = "player found";
    nameEl.textContent = p.name;
    teamEl.textContent = p.team + "（" + p.pref + "）";
  }else{
    box.className = "player notfound";
    nameEl.textContent = "該当なし";
    teamEl.textContent = "ゼッケンを確認してください";
  }
}

/* ================= 計算 ================= */
function num(id){
  const el = document.getElementById(id);
  if(!el) return null;
  const v = el.value;
  return v === "" ? null : Number(v);
}
function r3(x){ return Math.round(x*1000)/1000; }
function trunc3(x){ return Math.floor(x*1000 + 1e-9)/1000; } // 小数第4位切り捨て

/* 審判数に応じたEスコア計算 */
function calcE(values){
  const n = values.length;
  const sorted = [...values].sort((a,b)=>a-b);
  if(n === 1) return r3(sorted[0]);
  if(n === 2) return r3((sorted[0]+sorted[1])/2);
  if(n === 3) return trunc3((sorted[0]+sorted[1]+sorted[2])/3);
  if(n === 4) return r3((sorted[1]+sorted[2])/2);
  /* n === 5 */
  return trunc3((sorted[1]+sorted[2]+sorted[3])/3);
}

/* 決定点を計算して返す（入力モード用、表示は更新しない） */
function computeFinal(){
  const D = num("f_D") ?? 0, katen = num("f_katen") ?? 0, SB = num("f_SB") ?? 0;
  const es = eIds().map(id => num(id) ?? 0);
  const E = calcE(es);
  const pen = r3((num("f_shushin")??0)+(num("f_time")??0)+(num("f_line1")??0)+(num("f_line2")??0));
  return r3(D + katen + SB + E - pen);
}

function recalc(){
  if(state.mode === "訂正") return;
  const es = eIds().map(id => num(id) ?? 0);
  const E = calcE(es);
  const pen = r3((num("f_shushin")??0)+(num("f_time")??0)+(num("f_line1")??0)+(num("f_line2")??0));
  const final = computeFinal();
  const escoreEl = document.getElementById("escoreVal");
  if(escoreEl) escoreEl.textContent = fmt(E);
  document.getElementById("penVal").textContent = fmt(pen);
  document.getElementById("finalVal").textContent = final.toFixed(3);
}
function fmt(x){ return (Math.round(x*1000)/1000).toString(); }

/* E1〜Enは小数第1位まで表示（8 → 8.0） */
function formatEField(id){
  const el = document.getElementById(id);
  if(el && el.value !== "" && !isNaN(Number(el.value))) el.value = Number(el.value).toFixed(1);
}

/* 0点処理：表示中の全スコア欄に0を入れる（入力モード用） */
function zeroFill(){
  scoreIds().forEach(id => {
    document.getElementById(id).value = id.startsWith("f_E") ? "0.0" : "0";
  });
  recalc();
}

/* ================= 送信 ================= */
let sending = false;
async function send(){
  if(sending) return; // 連打防止
  const bib = document.getElementById("bib").value.trim();
  const st = document.getElementById("status");
  st.className = ""; st.textContent = "";

  if(!GAS_URL){ st.className="err"; st.textContent="GAS_URLが未設定です"; return; }
  if(!bib){ st.className="err"; st.textContent="ゼッケンを入力してください"; return; }
  if(!currentPlayer && !confirm("選手情報が見つかりません。このまま送信しますか？")) return;

  const raw = {};
  scoreIds().forEach(id => raw[id.slice(2)] = num(id));
  // 使っていないE欄（審判数より多いE）は常に空欄で送る
  for(let i=judgeCount()+1; i<=MAX_JUDGES; i++) raw["E"+i] = null;

  if(state.mode === "訂正"){
    const entered = scoreIds().some(id => num(id) !== null);
    if(!entered){
      st.className="err"; st.textContent="訂正する項目を入力してください"; return;
    }
  }else{
    scoreIds().forEach(id => { const k=id.slice(2); if(raw[k] === null) raw[k] = 0; });
    // 決定点がマイナスのまま保存されないようにする
    const finalScore = computeFinal();
    if(finalScore !== null && finalScore < 0){
      st.className="err";
      st.textContent="決定点がマイナスです（" + finalScore.toFixed(3) + "）。入力値を確認してください。";
      return;
    }
  }

  const payload = {
    token: API_TOKEN,
    gender: state.gender, event: state.event,
    mode: state.mode === "入力" ? "入力" : "訂正",
    bib: bib,
    playerName: currentPlayer ? currentPlayer.name : "",
    team: currentPlayer ? currentPlayer.team : "",
    ...raw
  };

  const btn = document.getElementById("send");
  sending = true;
  btn.disabled = true;
  document.getElementById("zeroFill").disabled = true;
  const btnLabel = btn.textContent;
  btn.textContent = "送信中、、、";
  st.textContent = "送信中、、、";
  try{
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: {"Content-Type": "text/plain;charset=utf-8"},
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if(data.ok){
      st.className="ok";
      st.textContent = "送信しました（" + state.gender + " " + state.event + " ゼッケン" + bib + "）";
      showLastRecord(payload);
      clearInputs();
    }else{
      st.className="err"; st.textContent = "エラー: " + (data.error || "不明");
    }
  }catch(e){
    st.className="err"; st.textContent = "送信に失敗しました。通信環境を確認してください。";
  }finally{
    sending = false;
    btn.disabled = false;
    document.getElementById("zeroFill").disabled = false;
    btn.textContent = btnLabel;
  }
}

function showLastRecord(p){
  const box = document.getElementById("lastRecord");
  const esc = s => String(s==null?"":s).replace(/[&<>]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
  const g = v => (v===null||v===undefined||v==="") ? "－" : v;

  const items = [];
  items.push(`<span class="lr-item"><span class="k">ゼッケン</span><b>${esc(p.bib)}</b></span>`);
  if(p.playerName) items.push(`<span class="lr-item"><b>${esc(p.playerName)}</b></span>`);
  items.push(`<span class="lr-item"><span class="k">種目</span>${esc(p.gender)} ${esc(p.event)}</span>`);
  items.push(`<span class="lr-item"><span class="k">区分</span>${esc(p.mode)}</span>`);

  const labels = {D:"D",katen:"加点",SB:"SB"};
  for(let i=1;i<=judgeCount();i++) labels["E"+i] = "E"+i;
  Object.assign(labels, {shushin:"減点",time:"TIME",line1:"LINE1",line2:"LINE2"});
  Object.keys(labels).forEach(k=>{
    if(p.mode==="訂正" && (p[k]===null||p[k]===undefined||p[k]==="")) return;
    items.push(`<span class="lr-item"><span class="k">${labels[k]}</span>${g(p[k])}</span>`);
  });

  if(p.mode==="入力"){
    const fv = document.getElementById("finalVal").textContent;
    items.push(`<span class="lr-item lr-final"><span class="k" style="color:inherit">決定点</span>${fv}</span>`);
  }

  const now = new Date().toLocaleTimeString("ja-JP");
  box.innerHTML = `<div class="lr-head">直近の送信レコード（${now}）</div>`
    + `<div class="lr-body">${items.join("")}</div>`;
  box.style.display = "block";
}

function clearInputs(){
  scoreIds().forEach(id => { const el=document.getElementById(id); if(el) el.value=""; });
  document.getElementById("bib").value = "";
  lookupPlayer(); recalc();
  const e = document.getElementById("escoreVal"); if(e) e.textContent = "-";
  document.getElementById("penVal").textContent = "-";
  document.getElementById("finalVal").textContent = "-";
}

/* ================= 中央モーダル式テンキー（タッチ端末） ================= */
const IS_TOUCH = window.matchMedia("(pointer: coarse)").matches;
let kpTarget = null;
let kpClosing = false;

function kpOpen(id){
  kpFormatIfE();
  // 直前の欄のハイライトを消す
  document.querySelectorAll(".box.kp-active").forEach(el=>el.classList.remove("kp-active"));
  kpTarget = id;
  updateKpHead();
  // 入力中の欄をフォーム上でも強調
  const inp = document.getElementById(id);
  const box = inp.closest(".box");
  if(box) box.classList.add("kp-active");
  document.getElementById("kpDisplay").textContent = inp.value;
  document.getElementById("kpOverlay").classList.add("open");
}
function updateKpHead(){
  const bib = document.getElementById("bib").value.trim();
  const pEl = document.getElementById("kpPlayer");
  const sEl = document.getElementById("kpSub");
  if(kpTarget === "bib"){
    pEl.textContent = "ゼッケン入力";
    sEl.textContent = state.gender + " " + state.event;
  }else if(currentPlayer){
    pEl.textContent = bib + ". " + currentPlayer.name;
    sEl.textContent = currentPlayer.team + "（" + currentPlayer.pref + "）";
  }else{
    pEl.textContent = bib ? "ゼッケン " + bib : "－";
    sEl.textContent = state.gender + " " + state.event;
  }
  document.getElementById("kpField").textContent = FIELD_LABELS[kpTarget] || "";
  document.getElementById("kpRange").textContent = RANGE_HINTS[kpTarget] || "";
  // E欄なら「E2（2人目 / 全4審判）」のように審判位置を強調表示
  const fEl = document.getElementById("kpField");
  fEl.classList.remove("is-e");
  if(kpTarget && kpTarget.startsWith("f_E")){
    const n = Number(kpTarget.slice(3));       // 1..5
    const total = judgeCount();
    fEl.textContent = FIELD_LABELS[kpTarget] + "　（" + n + "人目 / 全" + total + "審判）";
    fEl.classList.add("is-e");
  }
}
function kpFormatIfE(){
  if(kpTarget && kpTarget.startsWith("f_E")) formatEField(kpTarget);
}
function kpClose(){
  if(kpClosing) return;
  kpFormatIfE();
  recalc();
  kpTarget = null;
  kpClosing = true;
  const ov = document.getElementById("kpOverlay");
  ov.classList.add("closing"); // 透明化しつつクリックを吸収（ゴーストクリック対策）
  document.querySelectorAll(".box.kp-active").forEach(el=>el.classList.remove("kp-active"));
  setTimeout(()=>{ ov.classList.remove("open","closing"); kpClosing = false; }, 320);
}
function kpApply(key){
  if(!kpTarget) return;
  const el = document.getElementById(kpTarget);
  let v = el.value;
  if(key === "bs")       v = v.slice(0, -1);
  else if(key === "."){  if(kpTarget !== "bib" && !v.includes(".")) v += (v === "" ? "0." : "."); }
  else                   v += key;
  el.value = v;
  document.getElementById("kpDisplay").textContent = v;
  if(kpTarget === "bib"){ lookupPlayer(); updateKpHead(); }
  else recalc();
}
function kpNext(){
  // 「次へ」は隣の欄へ移動するだけ。送信は絶対に行わない。
  const order = fieldOrder();
  const i = order.indexOf(kpTarget);
  if(i >= 0 && i < order.length - 1){
    kpOpen(order[i + 1]);
  }else{
    kpClose(); // 最後の欄では閉じるのみ
  }
}
function initKeypad(){
  if(!IS_TOUCH) return;
  touchifyFields(["bib","f_D","f_katen","f_SB","f_shushin","f_time","f_line1","f_line2"]);
  // E欄は buildERow() 内で touchifyFields される

  document.querySelectorAll("#keypad .kp-grid button").forEach(b=>{
    b.addEventListener("click", (ev)=>{
      ev.preventDefault();
      const k = b.dataset.k;
      if(k === "next") kpNext();
      else kpApply(k);
    });
  });
  document.getElementById("kpDone").addEventListener("click", (ev)=>{ ev.preventDefault(); kpClose(); });
  // 背景タップで閉じる（キーパッド本体のタップでは閉じない）
  document.getElementById("kpOverlay").addEventListener("click", (ev)=>{
    if(ev.target === document.getElementById("kpOverlay")) kpClose();
  });
}
function touchifyFields(ids){
  ids.forEach(id=>{
    const el = document.getElementById(id);
    if(!el || el.dataset.kp) return;
    el.dataset.kp = "1";
    el.type = "text";           // number型は"8."などの途中入力を弾くため
    el.readOnly = true;         // OSキーボードを出さない
    el.setAttribute("inputmode","none");
    el.addEventListener("click", ()=>kpOpen(id));
  });
}

/* ================= 初期化 ================= */
document.getElementById("bib").addEventListener("input", lookupPlayer);
["f_D","f_katen","f_SB","f_shushin","f_time","f_line1","f_line2"].forEach(id =>
  document.getElementById(id).addEventListener("input", recalc));
document.getElementById("zeroFill").addEventListener("click", zeroFill);
document.getElementById("send").addEventListener("click", send);
document.getElementById("reloadPlayers").addEventListener("click", ()=>fetchPlayers(true));
if(!GAS_URL) document.getElementById("setup").style.display = "block";

renderTabs();
buildERow();
refreshContext();
initKeypad();
loadPlayersFromCache();
applyEventsFromSettings();
applySettingsToHeader();
renderTabs();
buildERow();
refreshContext();
fetchPlayers(false);
</script>
